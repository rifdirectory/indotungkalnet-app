services:
  mariadb:
    image: mariadb:10.11
    container_name: indotungkal_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: advance
      MYSQL_DATABASE: indotungkal_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: indotungkal_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: indotungkal_mariadb
    depends_on:
      - mariadb

volumes:
  mariadb_data:
